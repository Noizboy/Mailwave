name: mailwave

# Mailwave - local Docker Compose orchestration.
#
# Boots the full stack with:
#   copy .env.docker.example .env
#   docker compose -f docker-compose.local.yml up -d --build
#
# Easypanel Compose installs should use docker-compose.yml instead.
#
# This file uses the same ${VAR} substitution pattern as docker-compose.yml
# (Easypanel). Docker Compose auto-reads .env in the project directory for
# variable substitution, so no `env_file` directive is needed.

x-database-url: &database-url "postgresql://${POSTGRES_USER:-mailwave}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-mailwave}?schema=public"
x-redis-url: &redis-url "${REDIS_URL:-redis://redis:6379}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mailwave}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailwave} -d ${POSTGRES_DB:-mailwave}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - mailwave-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - mailwave-net

  migrate:
    build:
      context: .
      target: worker
    restart: "no"
    environment:
      DATABASE_URL: *database-url
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[migrate] applying prisma migrate deploy"
        node_modules/.bin/prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mailwave-net

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: *database-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      REDIS_URL: *redis-url
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mailwave-net

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: *database-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
      REDIS_URL: *redis-url
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mailwave-net

networks:
  mailwave-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
