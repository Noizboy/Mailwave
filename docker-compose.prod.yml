# Mailwave — production compose override.
#
# Apply on top of the local base file:
#   docker compose -f docker-compose.local.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.local.yml -f docker-compose.prod.yml up -d
#
# Differences vs. base:
#   - Pulls pre-built images from a registry instead of building. Do NOT pass
#     `--build` in production — run `docker compose pull` first so the image
#     tagged in `image:` is present and the base `build:` stanza is ignored.
#   - Removes host port bindings for Postgres/Redis/app (internal only).
#   - Caps container logs (json-file, 10m x 3 files).
#   - Front the app with a reverse proxy (Caddy or Traefik) that terminates
#     TLS and proxies to `app:3001` over the compose network.
#
# Real secrets must live in .env (gitignored) or Docker secrets — NEVER in
# this file. See .env.docker.prod.example for the template.
#
# Operator workflow:
#   1. Build & push images once (CI or manual):
#        docker build -t ghcr.io/<org>/mailwave:latest .
#        docker build --target worker -t ghcr.io/<org>/mailwave-worker:latest .
#        docker push ghcr.io/<org>/mailwave:latest
#        docker push ghcr.io/<org>/mailwave-worker:latest
#   2. Set MAILWAVE_APP_IMAGE / MAILWAVE_WORKER_IMAGE env vars (or edit below).
#   3. docker compose -f docker-compose.local.yml -f docker-compose.prod.yml pull
#   4. docker compose -f docker-compose.local.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    # No host port binding in production — only internal compose traffic.
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: ${MAILWAVE_WORKER_IMAGE:-ghcr.io/mailwave/worker:latest}
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ${MAILWAVE_APP_IMAGE:-ghcr.io/mailwave/app:latest}
    pull_policy: always
    # Do not publish 3001 to the host — the reverse proxy reaches `app:3001`
    # over the compose network.
    ports: []
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ${MAILWAVE_WORKER_IMAGE:-ghcr.io/mailwave/worker:latest}
    pull_policy: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
