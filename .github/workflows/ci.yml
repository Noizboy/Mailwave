name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Prisma generate needs a DATABASE_URL at config-eval time even though we
      # don't connect. Use a placeholder; no DB is touched in this job.
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public"
      # Required for the tracking-pixel signer (imported transitively by tests).
      AUTH_SECRET: "ci-auth-secret-for-tests-only-32-chars-min"
      ENCRYPTION_KEY: "ci-encryption-key-with-32-chars-min"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Next.js build reads these; values are placeholders, not secrets.
          NEXTAUTH_URL: "http://localhost:3001"

  audit:
    name: Dependency audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't block PRs on advisories — surface them as informational.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high & critical only)
        run: npm audit --omit=dev --audit-level=high
