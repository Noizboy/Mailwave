name: mailwave

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mailwave}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailwave} -d ${POSTGRES_DB:-mailwave}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - mailwave-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - mailwave-net

  migrate:
    build:
      context: .
      target: worker
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -d prisma/migrations ] && [ -n "$$(ls -A prisma/migrations 2>/dev/null)" ]; then
          echo "[migrate] applying prisma migrate deploy";
          npx prisma migrate deploy;
        else
          echo "[migrate] no versioned migrations found, running prisma db push";
          npx prisma db push --accept-data-loss=false;
        fi
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mailwave-net

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: ${REDIS_URL}
      OPENAI_CLIENT_ID: ${OPENAI_CLIENT_ID}
      OPENAI_CLIENT_SECRET: ${OPENAI_CLIENT_SECRET}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mailwave-net

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: ${REDIS_URL}
      OPENAI_CLIENT_ID: ${OPENAI_CLIENT_ID}
      OPENAI_CLIENT_SECRET: ${OPENAI_CLIENT_SECRET}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mailwave-net

networks:
  mailwave-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
