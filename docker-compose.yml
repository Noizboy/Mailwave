name: mailwave

# Mailwave - Easypanel Compose deployment.
#
# Goal:
# - Create one Easypanel service of type "Compose"
# - Point it at this repository
# - Configure environment variables
# - Deploy
#
# Required project env:
#   APP_DOMAIN         Public host, e.g. mailwave.example.com
#   AUTH_URL           Full public URL, e.g. https://mailwave.example.com
#   POSTGRES_PASSWORD  Password for the bundled postgres service
#   AUTH_SECRET        openssl rand -base64 32
#   ENCRYPTION_KEY     openssl rand -hex 16 (32+ chars)
#
# Optional project env:
#   POSTGRES_USER           Defaults to mailwave
#   POSTGRES_DB             Defaults to mailwave
#   AUTH_TRUST_HOST         Defaults to true
#REDIS_URL               Defaults to redis://redis:6379
#   TRAEFIK_NETWORK         Defaults to easypanel
#   TRAEFIK_CERT_RESOLVER   Defaults to letsencrypt
#   TRAEFIK_HTTP_MIDDLEWARE Defaults to redirect-to-https

x-database-url: &database-url "postgresql://${POSTGRES_USER:-mailwave}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mailwave}?schema=public"
x-redis-url: &redis-url "${REDIS_URL:-redis://redis:6379}"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mailwave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the Easypanel project env}
      POSTGRES_DB: ${POSTGRES_DB:-mailwave}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailwave} -d ${POSTGRES_DB:-mailwave}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - mailwave-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - mailwave-net

  migrate:
    build:
      context: .
      target: worker
    restart: "no"
    environment:
      DATABASE_URL: *database-url
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in the Easypanel project env}
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "[migrate] applying prisma migrate deploy"
        node_modules/.bin/prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mailwave-net

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: *database-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in the Easypanel project env}
      AUTH_URL: ${AUTH_URL:?AUTH_URL must be set in the Easypanel project env}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in the Easypanel project env}
      REDIS_URL: *redis-url
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-easypanel}"
      - "traefik.http.routers.mailwave-http.rule=Host(`${APP_DOMAIN:?APP_DOMAIN must be set in the Easypanel project env}`)"
      - "traefik.http.routers.mailwave-http.entrypoints=http"
      - "traefik.http.routers.mailwave-http.priority=100"
      - "traefik.http.routers.mailwave-http.middlewares=${TRAEFIK_HTTP_MIDDLEWARE:-redirect-to-https}"
      - "traefik.http.routers.mailwave-https.rule=Host(`${APP_DOMAIN:?APP_DOMAIN must be set in the Easypanel project env}`)"
      - "traefik.http.routers.mailwave-https.entrypoints=https"
      - "traefik.http.routers.mailwave-https.priority=100"
      - "traefik.http.routers.mailwave-https.tls=true"
      - "traefik.http.routers.mailwave-https.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.mailwave.loadbalancer.server.port=3001"
    networks:
      - mailwave-net
      - proxy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: *database-url
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set in the Easypanel project env}
      AUTH_URL: ${AUTH_URL:?AUTH_URL must be set in the Easypanel project env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in the Easypanel project env}
      REDIS_URL: *redis-url
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mailwave-net

networks:
  mailwave-net:
    driver: bridge
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-easypanel}

volumes:
  pgdata:
  redisdata:
